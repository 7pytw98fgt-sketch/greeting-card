<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>创建祝福贺卡</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Serif SC', serif;
      background: #111; color: #eee; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .container {
      max-width: 520px; width: 100%; margin: 2rem auto; padding: 2rem;
      background: #1a1a1a; border-radius: 16px; box-shadow: 0 4px 32px rgba(0,0,0,0.5);
    }
    h1 { text-align: center; font-size: 1.8rem; margin-bottom: 2rem; }
    label {
      display: block; margin-top: 1.2rem; margin-bottom: 0.4rem;
      font-size: 0.9rem; color: #aaa; font-weight: 500;
    }
    input, textarea, select {
      width: 100%; padding: 0.75rem 1rem; border: 1px solid #333;
      border-radius: 8px; background: #222; color: #eee; font-size: 1rem;
      font-family: inherit; transition: border-color 0.2s;
    }
    input:focus, textarea:focus, select:focus {
      outline: none; border-color: #e8b86d;
    }
    textarea { resize: vertical; min-height: 80px; }
    .row { display: flex; gap: 1rem; }
    .row > * { flex: 1; }
    button {
      display: block; width: 100%; margin-top: 2rem; padding: 0.9rem;
      border: none; border-radius: 10px; background: linear-gradient(135deg, #e8b86d, #d4a54a);
      color: #111; font-size: 1.1rem; font-weight: 700; cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    button:hover { opacity: 0.9; }
    button:active { transform: scale(0.98); }
    .result {
      margin-top: 2rem; padding: 1rem; background: #222; border-radius: 8px;
      word-break: break-all; font-size: 0.85rem; display: none;
    }
    .result.visible { display: block; }
    .result a { color: #e8b86d; }
    .copy-btn {
      margin-top: 0.75rem; background: #333; color: #eee; font-size: 0.9rem;
    }
    .required::after { content: ' *'; color: #e88; }
  </style>
</head>
<body>
  <div class="container">
    <h1>✨ 创建祝福贺卡</h1>
    <form id="greeting-form">
      <label class="required" for="recipientName">被祝福者姓名</label>
      <input id="recipientName" type="text" required placeholder="输入对方的名字" />

      <label for="recipientAge">年龄（选填）</label>
      <input id="recipientAge" type="number" min="0" max="150" placeholder="输入年龄" />

      <label class="required" for="occasion">祝福场景</label>
      <select id="occasion" required>
        <option value="birthday">🎂 生日</option>
        <option value="holiday">🎄 节日</option>
        <option value="graduation">🎓 毕业</option>
        <option value="wedding">💒 新婚</option>
        <option value="promotion">🚀 晋升</option>
        <option value="custom">✏️ 自定义</option>
      </select>

      <label class="required" for="senderName">你的名字</label>
      <input id="senderName" type="text" required placeholder="输入你的名字" />

      <label for="senderRelation">你们的关系</label>
      <input id="senderRelation" type="text" placeholder="如：同事、朋友、家人、同学..." />

      <label class="required" for="messageBody">祝福正文</label>
      <textarea id="messageBody" required placeholder="写下你想说的话..."></textarea>

      <label for="messageClosing">结尾寄语（选填）</label>
      <textarea id="messageClosing" placeholder="如：愿你新的一岁乘风破浪！"></textarea>

      <div class="row">
        <div>
          <label for="lang">界面语言</label>
          <select id="lang">
            <option value="zh-CN" selected>简体中文</option>
            <option value="zh-TW">繁體中文</option>
            <option value="en">English</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
            <option value="fr">Français</option>
            <option value="es">Español</option>
          </select>
        </div>
        <div>
          <label for="theme">主题风格</label>
          <select id="theme">
            <option value="warm" selected>🌅 温暖</option>
            <option value="cool">🌊 清凉</option>
            <option value="golden">✨ 金色</option>
            <option value="fresh">🌿 清新</option>
          </select>
        </div>
      </div>

      <button type="submit">✨ 生成祝福链接</button>
    </form>

    <div id="result" class="result">
      <p>📋 你的祝福链接已生成：</p>
      <a id="result-link" href="#" target="_blank"></a>
      <button id="copy-btn" class="copy-btn">📋 复制链接</button>
    </div>
  </div>

  <script type="module">
    import { encodeGreetingData, buildShareUrl } from './src/utils/url-codec.js';

    const form = document.getElementById('greeting-form');
    const resultDiv = document.getElementById('result');
    const resultLink = document.getElementById('result-link');
    const copyBtn = document.getElementById('copy-btn');

    form.addEventListener('submit', (e) => {
      e.preventDefault();

      const recipientName = document.getElementById('recipientName').value.trim();
      const recipientAge = document.getElementById('recipientAge').value.trim();
      const occasion = document.getElementById('occasion').value;
      const senderName = document.getElementById('senderName').value.trim();
      const senderRelation = document.getElementById('senderRelation').value.trim();
      const messageBody = document.getElementById('messageBody').value.trim();
      const messageClosing = document.getElementById('messageClosing').value.trim();
      const lang = document.getElementById('lang').value;
      const theme = document.getElementById('theme').value;

      if (!recipientName || !senderName || !messageBody) {
        alert('请填写所有必填字段');
        return;
      }

      const greetingData = {
        v: 1,
        lang,
        recipient: {
          name: recipientName,
          ...(recipientAge ? { age: parseInt(recipientAge, 10) } : {}),
        },
        occasion,
        sender: {
          name: senderName,
          ...(senderRelation ? { relation: senderRelation } : {}),
        },
        message: {
          ...(messageBody ? { greeting: messageBody.split('\n')[0].slice(0, 50) } : {}),
          body: messageBody,
          ...(messageClosing ? { closing: messageClosing } : {}),
        },
        theme,
      };

      const baseUrl = window.location.origin + window.location.pathname.replace('creator.html', 'index.html');
      const url = buildShareUrl(greetingData, baseUrl);

      resultLink.href = url;
      resultLink.textContent = url;
      resultDiv.classList.add('visible');

      // Scroll to result
      resultDiv.scrollIntoView({ behavior: 'smooth' });
    });

    copyBtn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(resultLink.href);
        copyBtn.textContent = '✅ 已复制！';
        setTimeout(() => { copyBtn.textContent = '📋 复制链接'; }, 2000);
      } catch {
        // Fallback
        resultLink.focus();
        resultLink.select?.();
        document.execCommand?.('copy');
        copyBtn.textContent = '✅ 已复制！';
        setTimeout(() => { copyBtn.textContent = '📋 复制链接'; }, 2000);
      }
    });
  </script>
</body>
</html>
