<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Envelope body -->
  <rect x="6" y="18" width="52" height="34" rx="3" fill="#FF6B6B" />
  <!-- Envelope flap -->
  <polygon points="6,18 32,40 58,18" fill="#FF8E8E" />
